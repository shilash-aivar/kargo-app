name: cd

on:
  push:
    branches:          # ← was "branch" (typo, trigger never fired)
      - "prod"

env:
  IMAGE_NAME: 18bit048/kargo-repo-prod  # ← pick one username and use it everywhere

jobs:
  release:
    name: Build and publish release image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU              # ← needed for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}   # ← consistent image name
          cache-from: type=gha
          cache-to: type=gha,mode=max
