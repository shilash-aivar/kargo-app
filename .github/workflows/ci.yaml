name: CI

on:
  pull_request:
    branches:
    - stage
  #push:
   # branches:
   # - dev

env:
  IMAGE_NAME: 18bit048/kargo-repo-stage

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: app/requirements.txt

    - name: Install dependencies
      run: pip install -r app/requirements.txt ruff

    - name: Lint
      run: ruff check app/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: app/requirements.txt

    - name: Install dependencies
      run: pip install -r app/requirements.txt pytest httpx

    - name: Run tests
      run: pytest tests/ -v

